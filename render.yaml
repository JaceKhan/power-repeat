services:
  - type: web
    name: power-repeat
    env: node
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- -H 0.0.0.0 -p $PORT
    envVars:
      - key: AUTH_SECRET
        generateValue: true
      - key: POWER_REPEAT_DATA_DIR
        value: /var/data
    disk:
      name: power-repeat-data
      mountPath: /var/data
      sizeGB: 1
